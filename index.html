<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFB700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="서연">
<meta name="description" content="나만의 멘탈 케어 챗봇 서연">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23FFB700'/%3E%3C/svg%3E">
<title>서연</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFB700;
    --yellow-light: #FFF3CC;
    --yellow-dark: #4a3300;
    --yellow-mid: #7a5500;
    --bg: #ffffff;
    --bg2: #f8f7f4;
    --bg3: #f0efe9;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #a0a0a0;
    --border: rgba(0,0,0,0.08);
    --radius: 18px;
    --radius-sm: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg2: #242420; --bg3: #2e2e28;
      --text: #f0efe8; --text2: #a0a09a; --text3: #606058;
      --border: rgba(255,255,255,0.08); --yellow-light: #2e2500;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }
  body { display: flex; justify-content: center; align-items: stretch; }
  #app { width: 100%; max-width: 430px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }
  .header { padding: 14px 16px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }
  .header-info { flex: 1; }
  .header-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; margin-top: 1px; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }
  .header-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 50%; color: var(--text2); }
  .header-btn:hover { background: var(--bg2); }
  .messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
  .msg { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.25s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }
  .bubble { max-width: 76%; padding: 10px 14px; font-size: 14px; line-height: 1.65; word-break: break-word; }
  .msg.bot .bubble { background: var(--bg2); color: var(--text); border-radius: 18px 18px 18px 4px; }
  .msg.user .bubble { background: var(--yellow); color: var(--yellow-dark); border-radius: 18px 18px 4px 18px; font-weight: 600; }
  .typing { display: flex; gap: 4px; padding: 12px 14px; background: var(--bg2); border-radius: 18px 18px 18px 4px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  .quick-area { padding: 6px 12px 4px; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
  .qr { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-family: inherit; color: var(--text2); cursor: pointer; transition: all .15s; font-weight: 600; }
  .qr:hover { background: var(--yellow-light); border-color: var(--yellow); color: var(--yellow-mid); }
  .input-area { padding: 10px 12px 12px; display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
  .input-box { flex: 1; display: flex; align-items: center; background: var(--bg2); border-radius: 24px; border: 1px solid var(--border); padding: 9px 14px; gap: 8px; }
  #userInput { flex: 1; border: none; background: transparent; font-family: inherit; font-size: 14px; color: var(--text); outline: none; resize: none; line-height: 1.5; max-height: 80px; min-height: 20px; }
  #userInput::placeholder { color: var(--text3); }
  .send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--yellow); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .15s; }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.93); }
  .send-btn svg { width: 18px; height: 18px; fill: none; stroke: var(--yellow-dark); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .mood-body { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }
  .mood-intro { text-align: center; }
  .mood-intro h2 { font-size: 17px; font-weight: 800; color: var(--text); }
  .mood-intro p { font-size: 13px; color: var(--text2); margin-top: 4px; line-height: 1.6; }
  .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .mood-card { background: var(--bg2); border: 1.5px solid transparent; border-radius: var(--radius-sm); padding: 16px 8px; text-align: center; cursor: pointer; transition: all .18s; display: flex; flex-direction: column; gap: 7px; align-items: center; }
  .mood-card:hover { border-color: var(--yellow); background: var(--yellow-light); }
  .mood-card.selected { border-color: var(--yellow); background: var(--yellow-light); transform: scale(0.96); }
  .mood-icon { font-size: 26px; line-height: 1; }
  .mood-label { font-size: 12px; color: var(--text2); font-weight: 700; }
  .diary-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
  .sec-title { font-size: 13px; font-weight: 700; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; padding: 4px 0; }
  .diary-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); animation: fadeUp .2s ease; }
  .diary-date { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 6px; }
  .diary-text { font-size: 14px; color: var(--text); line-height: 1.7; }
  .diary-tag { display: inline-block; margin-top: 10px; background: var(--yellow-light); border-radius: 20px; padding: 3px 12px; font-size: 12px; color: var(--yellow-mid); font-weight: 700; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.8; }
  .fab { background: var(--yellow); border: none; border-radius: 16px; padding: 14px 20px; font-family: inherit; font-size: 14px; font-weight: 800; color: var(--yellow-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform .15s; }
  .fab:hover { transform: scale(1.02); }
  .fab:active { transform: scale(0.97); }
  .nav { display: flex; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; padding: 10px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; transition: all .15s; }
  .nav-btn svg { width: 22px; height: 22px; stroke: var(--text3); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke .15s; }
  .nav-btn span { font-size: 10px; color: var(--text3); font-weight: 700; font-family: inherit; transition: color .15s; }
  .nav-btn.active svg { stroke: var(--yellow); }
  .nav-btn.active span { color: var(--yellow-mid); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; animation: fadeIn .2s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal { background: var(--bg); border-radius: 24px 24px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 430px; animation: slideUp .25s ease; }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal h3 { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 12px; }
  .modal textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; font-family: inherit; font-size: 14px; color: var(--text); outline: none; resize: none; min-height: 120px; line-height: 1.7; }
  .modal textarea::placeholder { color: var(--text3); }
  .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn-cancel { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--text2); cursor: pointer; }
  .btn-save { flex: 2; background: var(--yellow); border: none; border-radius: 12px; padding: 12px; font-family: inherit; font-size: 14px; font-weight: 800; color: var(--yellow-dark); cursor: pointer; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="chat-screen" class="screen active">
    <div class="header">
      <div class="avatar"></div>
      <div class="header-info">
        <div class="header-name">서연</div>
        <div class="header-sub"><span class="online-dot"></span>언제나 곁에 있어요</div>
      </div>
      <button class="header-btn" onclick="showScreen('mood-screen')" title="기분 체크">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:var(--yellow);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="msg-avatar"></div>
        <div class="bubble">안녕하세요 ☀️<br>오늘 하루 어떻게 지내고 있어요? 편하게 이야기해 줘요.</div>
      </div>
    </div>
    <div class="quick-area" id="quickArea">
      <button class="qr" onclick="sendQuick('오늘 좀 힘들었어')">힘들었어요</button>
      <button class="qr" onclick="sendQuick('그냥 대화하고 싶어')">대화하고 싶어요</button>
      <button class="qr" onclick="sendQuick('기분이 좋아!')">기분 좋아요</button>
      <button class="qr" onclick="sendQuick('불안한 느낌이 들어')">불안해요</button>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" placeholder="서연에게 말해봐요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <div id="mood-screen" class="screen">
    <div class="header">
      <button class="header-btn" onclick="showScreen('chat-screen')">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-info"><div class="header-name">오늘 기분은요? 🌤</div></div>
    </div>
    <div class="mood-body">
      <div class="mood-intro">
        <h2>지금 이 순간, 어떤 느낌인가요?</h2>
        <p>솔직하게 골라줘요<br>어떤 감정이든 괜찮아요</p>
      </div>
      <div class="mood-grid">
        <div class="mood-card" onclick="pickMood(this,'😄','신나요')"><span class="mood-icon">😄</span><span class="mood-label">신나요</span></div>
        <div class="mood-card" onclick="pickMood(this,'😊','좋아요')"><span class="mood-icon">😊</span><span class="mood-label">좋아요</span></div>
        <div class="mood-card" onclick="pickMood(this,'😌','평온해요')"><span class="mood-icon">😌</span><span class="mood-label">평온해요</span></div>
        <div class="mood-card" onclick="pickMood(this,'😔','우울해요')"><span class="mood-icon">😔</span><span class="mood-label">우울해요</span></div>
        <div class="mood-card" onclick="pickMood(this,'😰','불안해요')"><span class="mood-icon">😰</span><span class="mood-label">불안해요</span></div>
        <div class="mood-card" onclick="pickMood(this,'😤','화났어요')"><span class="mood-icon">😤</span><span class="mood-label">화났어요</span></div>
        <div class="mood-card" onclick="pickMood(this,'😴','피곤해요')"><span class="mood-icon">😴</span><span class="mood-label">피곤해요</span></div>
        <div class="mood-card" onclick="pickMood(this,'🥺','외로워요')"><span class="mood-icon">🥺</span><span class="mood-label">외로워요</span></div>
        <div class="mood-card" onclick="pickMood(this,'😶','모르겠어요')"><span class="mood-icon">😶</span><span class="mood-label">모르겠어요</span></div>
      </div>
    </div>
  </div>

  <div id="diary-screen" class="screen">
    <div class="header">
      <div class="avatar"></div>
      <div class="header-info">
        <div class="header-name">마음 일기 📓</div>
        <div class="header-sub">나만 볼 수 있어요</div>
      </div>
    </div>
    <div class="diary-body" id="diaryBody">
      <div class="sec-title">최근 기록</div>
      <div id="diaryList"></div>
      <button class="fab" onclick="openDiaryModal()">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--yellow-dark);fill:none;stroke-width:2.2;stroke-linecap:round;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        새 일기 쓰기
      </button>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-chat" onclick="showScreen('chat-screen')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>대화</span>
    </button>
    <button class="nav-btn" id="nav-mood" onclick="showScreen('mood-screen')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <span>기분</span>
    </button>
    <button class="nav-btn" id="nav-diary" onclick="showScreen('diary-screen')">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>일기</span>
    </button>
  </nav>
</div>

<div id="diaryModal" class="modal-bg" style="display:none" onclick="closeDiaryModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>오늘 하루를 기록해요 ✏️</h3>
    <textarea id="diaryInput" placeholder="오늘 어떤 일이 있었나요? 느낌, 생각, 무엇이든..." rows="5"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDiaryModal()">취소</button>
      <button class="btn-save" onclick="saveDiary()">저장하기</button>
    </div>
  </div>
</div>

<script>
const GEMINI_API_KEY = 'AQ.Ab8RN6JTXznKk9QNgNWOK-v5Ty_J-CCFAlshlAVfVFwp7OTRKw';
const SYSTEM_PROMPT = `당신은 '서연'이라는 이름의 따뜻한 멘탈 케어 챗봇입니다.
성격: 품격 있고, 착하고, 똑똑하며, 공감 능력이 뛰어납니다.
말투: 부드럽고 따뜻하게 존댓말로 대화하되, 너무 딱딱하지 않게 친근하게 말해요.
역할: 사용자의 감정을 잘 들어주고, 판단하지 않으며, 필요할 때는 부드럽게 조언해줍니다.
규칙: 200자 이내로 자연스럽게 답하세요. 과도한 이모지 사용은 피하되 가끔 따뜻한 느낌을 줄 수 있어요.`;

let history = [];
let diary = JSON.parse(localStorage.getItem('seoyeon_diary') || '[]');
let lastMood = null;

async function callGemini(text) {
  history.push({ role: 'user', parts: [{ text }] });
  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: history
      })
    });
    const d = await r.json();
    const reply = d.candidates?.[0]?.content?.parts?.[0]?.text || '잠깐 생각 중이에요... 다시 말해줄래요?';
    history.push({ role: 'model', parts: [{ text: reply }] });
    return reply;
  } catch(e) {
    return '연결이 잠깐 끊겼어요. 다시 시도해줄래요? 🙏';
  }
}

function addBubble(text, role) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  if (role === 'bot') {
    d.innerHTML = `<div class="msg-avatar"></div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  } else {
    d.innerHTML = `<div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  }
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="msg-avatar"></div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

async function sendMsg() {
  const el = document.getElementById('userInput');
  const t = el.value.trim();
  if (!t) return;
  el.value = ''; autoResize(el);
  document.getElementById('quickArea').style.display = 'none';
  addBubble(t, 'user');
  showTyping();
  const rep = await callGemini(t);
  hideTyping();
  addBubble(rep, 'bot');
}

function sendQuick(t) { document.getElementById('userInput').value = t; sendMsg(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const map = { 'chat-screen':'nav-chat', 'mood-screen':'nav-mood', 'diary-screen':'nav-diary' };
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (map[id]) document.getElementById(map[id]).classList.add('active');
  if (id === 'diary-screen') renderDiary();
}

async function pickMood(el, icon, label) {
  document.querySelectorAll('.mood-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  lastMood = { icon, label };
  setTimeout(async () => {
    diary.unshift({ date: new Date().toLocaleDateString('ko-KR'), mood: icon, moodLabel: label, text: '' });
    localStorage.setItem('seoyeon_diary', JSON.stringify(diary));
    showScreen('chat-screen');
    document.getElementById('quickArea').style.display = 'none';
    addBubble(`오늘 기분: ${icon} ${label}`, 'user');
    showTyping();
    const rep = await callGemini(`오늘 기분이 "${label}"이에요.`);
    hideTyping();
    addBubble(rep, 'bot');
  }, 350);
}

function renderDiary() {
  const el = document.getElementById('diaryList');
  if (!diary.length) {
    el.innerHTML = `<div class="empty-state">아직 기록이 없어요<br>오늘의 기분을 기록해봐요 ☁️</div>`;
    return;
  }
  el.innerHTML = diary.slice(0, 8).map(e => `
    <div class="diary-card">
      <div class="diary-date">${e.date}</div>
      <div class="diary-text">${e.text || '(기분만 기록했어요)'}</div>
      <span class="diary-tag">${e.mood} ${e.moodLabel}</span>
    </div>`).join('');
}

function openDiaryModal() {
  document.getElementById('diaryModal').style.display = 'flex';
  setTimeout(() => document.getElementById('diaryInput').focus(), 100);
}
function closeDiaryModal(e) {
  if (!e || e.target === document.getElementById('diaryModal')) {
    document.getElementById('diaryModal').style.display = 'none';
    document.getElementById('diaryInput').value = '';
  }
}
function saveDiary() {
  const t = document.getElementById('diaryInput').value.trim();
  if (!t) return;
  const m = lastMood || { icon: '😊', label: '기록' };
  diary.unshift({ date: new Date().toLocaleDateString('ko-KR'), mood: m.icon, moodLabel: m.label, text: t });
  localStorage.setItem('seoyeon_diary', JSON.stringify(diary));
  closeDiaryModal();
  renderDiary();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/my-chatbot/sw.js').catch(() => {});
}
</script>
